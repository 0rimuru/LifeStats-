<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Life Stats"/>
  <meta name="theme-color" content="#060a14"/>
  <title>Life Stats</title>
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23060a14'/%3E%3Ctext y='72' x='50' text-anchor='middle' font-size='60'%3E⚡%3C/text%3E%3C/svg%3E"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:#060a14;color:#e2e8f0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
    :root{--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
    input,textarea,button{-webkit-appearance:none;font-family:inherit}
    ::-webkit-scrollbar{display:none}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    #app{max-width:430px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}

    /* HEADER */
    .header{padding:calc(var(--safe-top) + 14px) 16px 12px;background:rgba(6,10,20,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.05);position:sticky;top:0;z-index:50}
    .header-inner{display:flex;justify-content:space-between;align-items:center}
    .header h1{font-size:20px;font-weight:900;letter-spacing:-.8px;color:#f1f5f9}
    .header .date{font-size:11px;color:rgba(255,255,255,.3);margin-top:2px}
    .lvl-badge{background:var(--lc15);border:1px solid var(--lc33);border-radius:12px;padding:8px 14px;text-align:right;cursor:pointer}
    .lvl-badge .lbl{font-size:10px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px}
    .lvl-badge .val{font-size:17px;font-weight:900;letter-spacing:-.5px}
    .lvl-badge .val span{font-size:11px;font-weight:600}

    /* EXP BAR */
    .exp-track{height:4px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;margin-top:5px}
    .exp-fill{height:100%;border-radius:99px;transition:width .8s cubic-bezier(.4,0,.2,1)}

    /* QUICK STATS */
    .quick{display:flex;gap:7px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.04)}
    .qpill{flex:1;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:12px;padding:9px 6px;text-align:center}
    .qpill .v{font-size:16px;font-weight:900}
    .qpill .l{font-size:9px;color:rgba(255,255,255,.25);margin-top:1px;text-transform:uppercase;letter-spacing:.5px}

    /* NAV */
    .nav{display:flex;border-bottom:1px solid rgba(255,255,255,.05)}
    .nav button{flex:1;padding:11px 0;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.25);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
    .nav button.active{border-bottom-color:var(--lc);color:var(--lc)}

    /* CONTENT */
    .content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(88px + var(--safe-bot))}

    /* CARDS */
    .card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:14px 16px;margin-bottom:10px}
    .cat-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:12px 14px;margin-bottom:8px}
    .cat-grid{display:grid;grid-template-columns:32px 1fr 46px;align-items:center;gap:10px}
    .cat-icon{font-size:20px;text-align:center}
    .cat-label-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .cat-label{font-size:13px;font-weight:700;color:rgba(255,255,255,.8)}
    .cat-hint{font-size:10px;font-weight:600}
    .cat-input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:8px 12px;color:#f1f5f9;font-size:16px;font-weight:600;outline:none}
    .cat-input:focus{border-color:rgba(255,255,255,.2)}
    .prog-track{height:3px;background:rgba(255,255,255,.06);border-radius:99px;margin-top:7px;overflow:hidden}
    .prog-fill{height:100%;border-radius:99px;transition:width .4s ease}
    .ring-unit{font-size:9px;color:rgba(255,255,255,.25);margin-top:2px;text-align:center}

    /* HERO */
    .score-hero{margin:16px 16px 0;border-radius:20px;padding:20px 20px 18px;position:relative;overflow:hidden}
    .score-hero-bg{position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;opacity:.5}

    /* SECTION TITLE */
    .sec{font-size:10px;font-weight:700;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}

    /* SAVE BUTTON */
    .save-btn{display:block;width:100%;padding:15px;border-radius:14px;border:none;color:#fff;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:.3px;margin-bottom:20px;transition:opacity .15s}
    .save-btn:active{opacity:.85}

    /* NOTE */
    .note-area{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:12px 14px;color:rgba(255,255,255,.8);font-size:14px;outline:none;resize:none;line-height:1.6}
    .note-area:focus{border-color:rgba(255,255,255,.15)}

    /* HISTORY */
    .hcard{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px}
    .hbadge{width:42px;height:42px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;border-width:1.5px;border-style:solid}
    .htag{border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700}
    .hnote{font-size:11px;color:rgba(255,255,255,.3);margin-top:6px;font-style:italic;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

    /* LEVEL */
    .level-hero{border-radius:20px;padding:24px 20px;margin-bottom:12px;text-align:center;position:relative;overflow:hidden}
    .level-num{font-size:72px;font-weight:900;letter-spacing:-4px;line-height:1}
    .level-title{font-size:18px;font-weight:800;color:rgba(255,255,255,.85);margin-top:4px;letter-spacing:-.5px}
    .level-exp-total{font-size:12px;color:rgba(255,255,255,.3);margin-top:2px}
    .level-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;margin-bottom:6px;border:1px solid rgba(255,255,255,.04);transition:all .2s}
    .level-badge{width:32px;height:32px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;border-width:1.5px;border-style:solid}
    .level-row.active-lvl{border-color:rgba(255,255,255,.1)}
    .exp-info-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}

    /* TRENDS */
    .trend-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.04)}

    /* TAB BAR */
    .tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(6,10,20,.95);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,.06);display:flex;padding:8px 0 calc(8px + var(--safe-bot));z-index:100}
    .tbtn{flex:1;background:none;border:none;color:rgba(255,255,255,.2);font-size:10px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding-top:4px;transition:color .2s}
    .tbtn.active{color:var(--lc)}
    .tbtn .ti{font-size:22px}

    /* TOAST */
    .toast{position:fixed;bottom:calc(96px + var(--safe-bot));left:50%;transform:translateX(-50%);background:rgba(30,41,59,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:#34D399;padding:11px 26px;border-radius:100px;font-size:13px;font-weight:700;border:1px solid rgba(52,211,153,.2);box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:999;pointer-events:none;display:none}
    .toast.show{display:block;animation:toastIn .25s cubic-bezier(.34,1.56,.64,1)}

    /* EMPTY */
    .empty{text-align:center;padding:60px 0;color:rgba(255,255,255,.2)}
    .empty .ei{font-size:48px;margin-bottom:12px}
    .empty p{font-size:14px;color:rgba(255,255,255,.3)}

    .stat3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
    .stat3c{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px 10px;text-align:center}
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-inner">
      <div>
        <h1>Life Stats</h1>
        <div class="date" id="hdate"></div>
      </div>
      <div class="lvl-badge" id="lvlbadge" onclick="setView('level')">
        <div class="lbl">Level</div>
        <div class="val" id="lvlval">–</div>
        <div class="exp-track"><div class="exp-fill" id="expfill" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <div class="quick">
    <div class="qpill"><div class="v" id="qs-avg">–</div><div class="l">Ø Score</div></div>
    <div class="qpill"><div class="v" id="qs-days">0</div><div class="l">Tage</div></div>
    <div class="qpill"><div class="v" id="qs-today">–</div><div class="l">Heute</div></div>
    <div class="qpill"><div class="v" id="qs-streak">–</div><div class="l">Streak</div></div>
  </div>

  <div class="nav" id="nav">
    <button class="active" onclick="setView('today')">Heute</button>
    <button onclick="setView('level')">Level</button>
    <button onclick="setView('history')">Verlauf</button>
  </div>

  <div class="content" id="content"></div>

  <div class="tabbar">
    <button class="tbtn active" id="tb-today" onclick="setView('today')"><span class="ti">📝</span>Heute</button>
    <button class="tbtn" id="tb-level" onclick="setView('level')"><span class="ti">⚡</span>Level</button>
    <button class="tbtn" id="tb-history" onclick="setView('history')"><span class="ti">📅</span>Verlauf</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const CATS = [
  {id:'sleep',     label:'Schlaf',     unit:'h',  icon:'🌙',max:12, optimal:8, bell:true,  color:'#818CF8'},
  {id:'water',     label:'Wasser',     unit:'L',  icon:'💧',max:4,  optimal:4, bell:false, color:'#38BDF8'},
  {id:'sport',     label:'Sport',      unit:'min',icon:'🏋️',max:120,optimal:120,bell:false,color:'#34D399'},
  {id:'focus',     label:'Deep Work',  unit:'h',  icon:'🧠',max:10, optimal:10,bell:false, color:'#F59E0B'},
  {id:'mood',      label:'Stimmung',   unit:'/10',icon:'😊',max:10, optimal:10,bell:false, color:'#F472B6'},
  {id:'steps',     label:'Schritte',   unit:'k',  icon:'👟',max:20, optimal:20,bell:false, color:'#A78BFA'},
  {id:'reading',   label:'Lesen',      unit:'min',icon:'📚',max:120,optimal:120,bell:false,color:'#FB923C'},
  {id:'meditation',label:'Meditation', unit:'min',icon:'🧘',max:60, optimal:60, bell:false,color:'#2DD4BF'},
];

const LEVELS = [
  {level:1, title:'Einsteiger',       minExp:0},
  {level:2, title:'Anfänger',         minExp:100},
  {level:3, title:'Lernender',        minExp:250},
  {level:4, title:'Aufsteiger',       minExp:450},
  {level:5, title:'Fokussierter',     minExp:700},
  {level:6, title:'Disziplinierter',  minExp:1000},
  {level:7, title:'Routinier',        minExp:1400},
  {level:8, title:'Beständiger',      minExp:1900},
  {level:9, title:'Fortgeschrittener',minExp:2500},
  {level:10,title:'Profi',            minExp:3200},
  {level:11,title:'Experte',          minExp:4100},
  {level:12,title:'Meister',          minExp:5200},
  {level:13,title:'Elite',            minExp:6500},
  {level:14,title:'Champion',         minExp:8000},
  {level:15,title:'Legende',          minExp:10000},
];

const LVL_COLORS = ['#818CF8','#38BDF8','#34D399','#F59E0B','#F472B6','#c084fc'];

const STORAGE_KEY = 'lifestats-v3';
let days = {};
try { days = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch{}

let draft = {};
let currentView = 'today';

const todayStr = () => new Date().toISOString().slice(0,10);

// ─── SCORING ─────────────────────────────────────────────────────────────────
function catScore(cat, val) {
  const v = parseFloat(val || 0);
  if (v <= 0) return 0;
  if (cat.bell) {
    const r = v / cat.optimal;
    return r <= 1 ? r : Math.max(0, 1 - (r - 1) * 0.6);
  }
  return Math.min(v / cat.optimal, 1);
}

function calcScore(entry) {
  if (!entry) return null;
  const vals = CATS.map(c => catScore(c, entry[c.id]));
  if (!vals.some(v => v > 0)) return null;
  return Math.round(vals.reduce((a,b)=>a+b,0) / CATS.length * 100);
}

function scoreColor(s) {
  return s >= 80 ? '#34D399' : s >= 60 ? '#F59E0B' : s >= 40 ? '#FB923C' : '#F87171';
}

// ─── LEVEL ───────────────────────────────────────────────────────────────────
function calcExp(entry, score) {
  if (!entry || score == null) return 0;
  return Math.round(score * 1.5) + (score >= 90 ? 25 : score >= 80 ? 10 : 0);
}

function getTotalExp() {
  return Object.keys(days).reduce((acc, d) => {
    const sc = calcScore(days[d]);
    return acc + calcExp(days[d], sc);
  }, 0);
}

function getLevelInfo(totalExp) {
  let cur = LEVELS[0], nxt = LEVELS[1];
  for (let i = LEVELS.length-1; i >= 0; i--) {
    if (totalExp >= LEVELS[i].minExp) { cur = LEVELS[i]; nxt = LEVELS[i+1]||null; break; }
  }
  const inLevel = totalExp - cur.minExp;
  const needed = nxt ? nxt.minExp - cur.minExp : 1;
  return { cur, nxt, inLevel, needed, progress: nxt ? Math.min(inLevel/needed,1) : 1, totalExp };
}

function lvlColor(level) {
  return LVL_COLORS[(level-1) % LVL_COLORS.length];
}

// ─── STREAK ──────────────────────────────────────────────────────────────────
function getStreak() {
  let s = 0; const d = new Date();
  while (days[d.toISOString().slice(0,10)]) { s++; d.setDate(d.getDate()-1); }
  return s;
}

// ─── HEADER UPDATE ───────────────────────────────────────────────────────────
function updateHeader() {
  const today = todayStr();
  document.getElementById('hdate').textContent =
    new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});

  const sorted = Object.keys(days).sort((a,b)=>b.localeCompare(a));
  const streak = getStreak();
  const todayScore = calcScore({...draft});
  const scores = sorted.slice(0,14).map(d=>calcScore(days[d])).filter(s=>s!=null);
  const avg = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : null;
  const totalExp = getTotalExp();
  const li = getLevelInfo(totalExp);
  const lc = lvlColor(li.cur.level);

  // CSS vars
  document.documentElement.style.setProperty('--lc', lc);
  document.documentElement.style.setProperty('--lc15', lc+'26');
  document.documentElement.style.setProperty('--lc33', lc+'55');

  // Level badge
  document.getElementById('lvlval').innerHTML = `${li.cur.level} <span>${li.cur.title}</span>`;
  document.getElementById('lvlval').style.color = lc;
  document.getElementById('expfill').style.width = (li.progress*100)+'%';
  document.getElementById('expfill').style.background = `linear-gradient(90deg,${lc},#c084fc)`;
  document.getElementById('expfill').style.boxShadow = `0 0 10px ${lc}88`;

  // Quick stats
  const as = document.getElementById('qs-avg');
  as.textContent = avg??'–'; as.style.color = avg ? scoreColor(avg) : 'rgba(255,255,255,.25)';
  document.getElementById('qs-days').textContent = sorted.length;
  const ts = document.getElementById('qs-today');
  ts.textContent = todayScore??'–'; ts.style.color = todayScore ? scoreColor(todayScore) : 'rgba(255,255,255,.25)';
  const st = document.getElementById('qs-streak');
  st.textContent = streak > 0 ? '🔥'+streak : '–'; st.style.color = streak > 0 ? '#F59E0B' : 'rgba(255,255,255,.25)';

  // Nav active
  document.querySelectorAll('.nav button').forEach((b,i) => {
    b.classList.toggle('active', ['today','level','history'][i]===currentView);
  });
  ['today','level','history'].forEach(v => {
    document.getElementById('tb-'+v).classList.toggle('active', v===currentView);
  });
}

// ─── SVG HELPERS ─────────────────────────────────────────────────────────────
function ringHTML(pct, color, size=46) {
  const r=(size-7)/2, circ=2*Math.PI*r, dash=Math.min(pct,1)*circ;
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg);display:block">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="5"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="5"
      stroke-dasharray="${dash} ${circ}" stroke-linecap="round" style="transition:stroke-dasharray .4s ease"/>
  </svg>`;
}

function scoreArcHTML(score) {
  const W=170,r=66,circ=Math.PI*r;
  const col = score!=null ? scoreColor(score) : 'rgba(255,255,255,.08)';
  const dash = score!=null ? score/100*circ : 0;
  return `<svg width="${W}" height="86" viewBox="0 0 ${W} 86">
    <defs><linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="${col}" stop-opacity=".6"/>
      <stop offset="100%" stop-color="${col}"/>
    </linearGradient></defs>
    <path d="M 12 82 A ${r} ${r} 0 0 1 ${W-12} 82" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="10" stroke-linecap="round"/>
    <path d="M 12 82 A ${r} ${r} 0 0 1 ${W-12} 82" fill="none" stroke="url(#ag)" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="${dash} ${circ}" style="transition:stroke-dasharray .7s cubic-bezier(.4,0,.2,1)"/>
    <text x="${W/2}" y="66" text-anchor="middle" fill="${col}"
      style="font-size:34px;font-weight:900;font-family:system-ui,sans-serif;letter-spacing:-1px">${score??'–'}</text>
    <text x="${W/2}" y="82" text-anchor="middle" fill="rgba(255,255,255,.3)"
      style="font-size:11px;font-family:system-ui,sans-serif;letter-spacing:1px">TAGESSCORE</text>
  </svg>`;
}

function sparklineHTML(data) {
  if (data.length < 2) return '<p style="font-size:12px;color:rgba(255,255,255,.2);padding:10px 0">Mehr Tage eintragen für Verlauf.</p>';
  const W=280,H=52,max=Math.max(...data,1),min=Math.min(...data,0),range=max-min||1;
  const pt=(s,i)=>[i/(data.length-1)*W, H-8-(s-min)/range*(H-16)];
  const pts=data.map((s,i)=>pt(s,i).join(',')).join(' ');
  const area=`M ${pt(data[0],0).join(',')} ${data.slice(1).map((s,i)=>'L '+pt(s,i+1).join(',')).join(' ')} L ${W} ${H} L 0 ${H} Z`;
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block;overflow:visible">
    <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6C63FF" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#6C63FF" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#sg)"/>
    <polyline points="${pts}" fill="none" stroke="#818CF8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${data.map((s,i)=>{const[x,y]=pt(s,i);return`<circle cx="${x}" cy="${y}" r="3.5" fill="#060a14" stroke="#818CF8" stroke-width="2"/>
    <text x="${x}" y="${y-8}" text-anchor="middle" fill="rgba(255,255,255,.35)" style="font-size:9px;font-family:system-ui">${s}</text>`}).join('')}
  </svg>`;
}

// ─── VIEWS ───────────────────────────────────────────────────────────────────
function renderToday() {
  const today = todayStr();
  draft = days[today] ? {...days[today]} : {};
  const score = calcScore(draft);
  const exp = calcExp(draft, score);
  const lc = lvlColor(getLevelInfo(getTotalExp()).cur.level);
  const saved = !!days[today];

  let h = `<div style="animation:fadeUp .3s ease">`;

  // Hero
  h += `<div class="score-hero" style="background:linear-gradient(135deg,${lc}12,${lc}06);border:1px solid ${lc}1e">
    <div class="score-hero-bg" style="background:${lc}0a"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;position:relative">
      <div>
        <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px">
          ${new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'})}
        </div>
        ${scoreArcHTML(score)}
      </div>
      <div style="text-align:right">
        <div style="font-size:10px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Heute EXP</div>
        <div style="font-size:28px;font-weight:900;color:#818CF8;letter-spacing:-1px">+${exp}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.3);margin-top:2px">${saved?'✓ gespeichert':'noch offen'}</div>
      </div>
    </div>
  </div>`;

  h += `<div style="padding:16px 16px 0">`;
  h += `<div class="sec">Eintragen</div>`;

  CATS.forEach(c => {
    const val = draft[c.id]||'';
    const sc = catScore(c, val);
    const pct = sc*100;
    const over = c.bell && parseFloat(val||0) > c.optimal;
    const barColor = over
      ? 'linear-gradient(90deg,#F59E0B,#FB923C)'
      : `linear-gradient(90deg,${c.color}99,${c.color})`;
    const ringColor = over ? '#FB923C' : c.color;

    h += `<div class="cat-card">
      <div class="cat-grid">
        <div class="cat-icon">${c.icon}</div>
        <div>
          <div class="cat-label-row">
            <span class="cat-label">${c.label}</span>
            ${c.bell ? `<span class="cat-hint" style="color:${over?'#FB923C':'rgba(255,255,255,.2)'}">${over?'⚠ zu viel':'optimal: '+c.optimal+c.unit}</span>` : ''}
          </div>
          <input class="cat-input" type="number" inputmode="decimal" placeholder="0" value="${val}"
            oninput="onCatInput('${c.id}',this.value)"
            style="border-color:${val?c.color+'44':'rgba(255,255,255,.07)'}"/>
          <div class="prog-track">
            <div class="prog-fill" id="prog-${c.id}" style="width:${pct}%;background:${barColor};box-shadow:${val?`0 0 8px ${c.color}55`:'none'}"></div>
          </div>
        </div>
        <div>
          <div id="ring-${c.id}">${ringHTML(sc, ringColor)}</div>
          <div class="ring-unit">${c.unit}</div>
        </div>
      </div>
    </div>`;
  });

  h += `<div style="margin-top:4px;margin-bottom:10px">
    <div class="sec">Notiz (optional)</div>
    <textarea class="note-area" rows="3" placeholder="Highlights, Reflexion, Gedanken…"
      oninput="draft.note=this.value">${draft.note||''}</textarea>
  </div>`;

  h += `<button class="save-btn" onclick="saveToday()"
    style="background:linear-gradient(135deg,#6C63FF,#8B5CF6,#a855f7);box-shadow:0 4px 24px rgba(108,99,255,.35)">
    ${saved ? '✓ Aktualisieren' : 'Speichern'}
  </button>`;

  h += `</div></div>`;
  document.getElementById('content').innerHTML = h;
}

function onCatInput(id, val) {
  draft[id] = val;
  const cat = CATS.find(c=>c.id===id);
  const sc = catScore(cat, val);
  const over = cat.bell && parseFloat(val||0) > cat.optimal;
  const ringColor = over ? '#FB923C' : cat.color;
  const barColor = over ? 'linear-gradient(90deg,#F59E0B,#FB923C)' : `linear-gradient(90deg,${cat.color}99,${cat.color})`;

  const prog = document.getElementById('prog-'+id);
  if (prog) { prog.style.width=(sc*100)+'%'; prog.style.background=barColor; prog.style.boxShadow=val?`0 0 8px ${cat.color}55`:'none'; }
  const ring = document.getElementById('ring-'+id);
  if (ring) ring.innerHTML = ringHTML(sc, ringColor);

  // update arc + exp
  const score = calcScore(draft);
  const exp = calcExp(draft, score);
  const arcEl = document.querySelector('.score-hero svg');
  if (arcEl) arcEl.outerHTML = scoreArcHTML(score);
  const expEl = document.querySelector('.score-hero [style*="font-size:28px"]');
  if (expEl) expEl.textContent = '+'+exp;

  updateHeader();
}

function saveToday() {
  const today = todayStr();
  days[today] = {...draft, _savedAt: new Date().toISOString()};
  localStorage.setItem(STORAGE_KEY, JSON.stringify(days));
  showToast('✓ Gespeichert!');
  updateHeader();
  renderToday();
}

function renderLevel() {
  const totalExp = getTotalExp();
  const li = getLevelInfo(totalExp);
  const lc = lvlColor(li.cur.level);
  const sorted = Object.keys(days).sort((a,b)=>b.localeCompare(a));
  const streak = getStreak();
  const scores = sorted.slice(0,14).map(d=>calcScore(days[d])).filter(s=>s!=null);
  const avg = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : null;

  let h = `<div style="padding:16px 16px 0;animation:fadeUp .3s ease">`;

  // Level hero
  h += `<div class="level-hero" style="background:linear-gradient(135deg,${lc}15,${lc}06);border:1px solid ${lc}22">
    <div style="position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:${lc}08"></div>
    <div style="position:relative">
      <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px">Level</div>
      <div class="level-num" style="color:${lc}">${li.cur.level}</div>
      <div class="level-title">${li.cur.title}</div>
      <div class="level-exp-total">${totalExp.toLocaleString('de-DE')} EXP gesamt</div>
      <div style="margin-top:20px">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <span style="font-size:11px;color:rgba(255,255,255,.4)">${li.inLevel} EXP</span>
          ${li.nxt ? `<span style="font-size:11px;color:rgba(255,255,255,.4)">${li.needed-li.inLevel} bis Level ${li.nxt.level}</span>` : ''}
        </div>
        <div class="exp-track" style="height:6px">
          <div class="exp-fill" style="width:${li.progress*100}%;background:linear-gradient(90deg,${lc},#c084fc);box-shadow:0 0 12px ${lc}88"></div>
        </div>
        ${li.nxt ? `<div style="display:flex;justify-content:space-between;margin-top:6px">
          <span style="font-size:10px;color:${lc};font-weight:700">LVL ${li.cur.level}</span>
          <span style="font-size:10px;color:rgba(255,255,255,.25);font-weight:700">LVL ${li.nxt.level} – ${li.nxt.title}</span>
        </div>` : `<div style="font-size:11px;color:${lc};margin-top:6px;font-weight:700">MAX LEVEL erreicht 🏆</div>`}
      </div>
    </div>
  </div>`;

  // Stat grid
  h += `<div class="stat3" style="margin-bottom:12px">`;
  [['🔥','Streak',streak>0?streak+'d':'–','#F59E0B'],
   ['⚡','Ø EXP/Tag',sorted.length?Math.round(totalExp/sorted.length):'–','#818CF8'],
   ['🎯','Ø Score',avg??'–',avg?scoreColor(avg):'rgba(255,255,255,.25)']
  ].forEach(([ic,l,v,c])=>{
    h+=`<div class="stat3c"><div style="font-size:20px;margin-bottom:4px">${ic}</div>
      <div style="font-size:18px;font-weight:900;color:${c};letter-spacing:-.5px">${v}</div>
      <div style="font-size:10px;color:rgba(255,255,255,.25);margin-top:2px;text-transform:uppercase;letter-spacing:.5px">${l}</div></div>`;
  });
  h += `</div>`;

  // EXP info
  h += `<div class="card" style="margin-bottom:12px">
    <div class="sec">EXP-System</div>`;
  [['📊','Basis EXP','Tagesscore × 1.5'],
   ['⭐','Perfekt-Bonus','+25 EXP ab Score 90 · +10 ab Score 80'],
   ['🌙','Schlaf-Tipp','8h = perfekt – mehr oder weniger gibt weniger Punkte']
  ].forEach(([ic,t,d])=>{
    h+=`<div class="exp-info-row"><span style="font-size:16px;flex-shrink:0">${ic}</span>
      <div><div style="font-size:13px;font-weight:700;color:rgba(255,255,255,.7)">${t}</div>
      <div style="font-size:11px;color:rgba(255,255,255,.3);margin-top:1px">${d}</div></div></div>`;
  });
  h += `</div>`;

  // All levels
  h += `<div class="sec">Alle Level</div>`;
  LEVELS.forEach(lvl => {
    const isActive = lvl.level === li.cur.level;
    const isDone = totalExp >= lvl.minExp;
    const c = lvlColor(lvl.level);
    h += `<div class="level-row${isActive?' active-lvl':''}" style="${isActive?`background:${c}10;border-color:${c}22`:''}">
      <div class="level-badge" style="background:${isDone?c+'22':'rgba(255,255,255,.04)'};border-color:${isDone?c+'55':'rgba(255,255,255,.08)'};color:${isDone?c:'rgba(255,255,255,.2)'}">
        ${lvl.level}
      </div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;color:${isDone?'rgba(255,255,255,.8)':'rgba(255,255,255,.25)'}">${lvl.title}</div>
        <div style="font-size:10px;color:rgba(255,255,255,.2)">${lvl.minExp.toLocaleString('de-DE')} EXP</div>
      </div>
      ${isActive?`<div style="font-size:10px;font-weight:800;color:${c};background:${c}18;padding:3px 10px;border-radius:99px">Aktuell</div>`:isDone?'<div style="font-size:14px">✓</div>':''}
    </div>`;
  });

  h += `</div>`;
  document.getElementById('content').innerHTML = h;
}

function renderHistory() {
  const today = todayStr();
  const sorted = Object.keys(days).sort((a,b)=>b.localeCompare(a));
  const scores = sorted.slice(0,14).reverse().map(d=>calcScore(days[d])).filter(s=>s!=null);

  let h = `<div style="padding:16px 16px 0;animation:fadeUp .3s ease">`;

  if (scores.length > 1) {
    h += `<div class="card" style="margin-bottom:12px">
      <div class="sec">Score-Verlauf (${scores.length} Tage)</div>
      ${sparklineHTML(scores)}
      <div style="display:flex;justify-content:space-between;margin-top:12px">
        ${[['Min',Math.min(...scores)],['Ø',Math.round(scores.reduce((a,b)=>a+b,0)/scores.length)],['Max',Math.max(...scores)]].map(([l,v])=>
          `<div style="text-align:center"><div style="font-size:10px;color:rgba(255,255,255,.25);margin-bottom:2px">${l}</div>
          <div style="font-size:16px;font-weight:900;color:${scoreColor(v)}">${v}</div></div>`
        ).join('')}
      </div>
    </div>`;
  }

  h += `<div class="sec">${sorted.length} Einträge</div>`;

  if (!sorted.length) {
    h += `<div class="empty"><div class="ei">📋</div><p>Noch keine Einträge.</p></div>`;
  }

  sorted.forEach(date => {
    const entry = days[date];
    const sc = calcScore(entry);
    const col = sc!=null ? scoreColor(sc) : '#334155';
    const exp = calcExp(entry, sc);
    const tags = CATS.map(c => entry[c.id]
      ? `<span class="htag" style="background:${c.color}18;color:${c.color}">${c.icon} ${entry[c.id]}${c.unit}</span>`
      : '').filter(Boolean).join('');

    h += `<div class="hcard">
      ${sc!=null?`<div class="hbadge" style="background:${col}18;border-color:${col}44;color:${col}">${sc}</div>`:''}
      <div style="flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
          <span style="font-size:12px;font-weight:700;color:rgba(255,255,255,.5)">${date===today?'Heute':fmtDate(date)}</span>
          <span style="font-size:11px;font-weight:800;color:#818CF8">+${exp} EXP</span>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">${tags}</div>
        ${entry.note?`<div class="hnote">"${entry.note}"</div>`:''}
      </div>
    </div>`;
  });

  h += `</div>`;
  document.getElementById('content').innerHTML = h;
}

function fmtDate(ds) {
  return new Date(ds+'T12:00:00').toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'});
}

// ─── NAV ─────────────────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  updateHeader();
  if (v==='today')   renderToday();
  if (v==='level')   renderLevel();
  if (v==='history') renderHistory();
  document.getElementById('content').scrollTop = 0;
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
updateHeader();
renderToday();
</script>
</body>
</html>
