<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23060a14'/%3E%3Ctext y='72' x='50' text-anchor='middle' font-size='60'%3E⚡%3C/text%3E%3C/svg%3E"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:#060a14;color:#e2e8f0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}

    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
    input,textarea,button,select{-webkit-appearance:none;font-family:inherit}
    ::-webkit-scrollbar{display:none}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

    #app{max-width:430px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}

    /* HEADER */
    .header{padding:calc(var(--safe-top) + 14px) 16px 12px;background:rgba(6,10,20,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.05);position:sticky;top:0;z-index:50}
    .header-inner{display:flex;justify-content:space-between;align-items:center}
    .header h1{font-size:20px;font-weight:900;letter-spacing:-.8px;color:#f1f5f9}
    .header .date{font-size:11px;color:rgba(255,255,255,.3);margin-top:2px}
    .lvl-badge{background:var(--lc15);border:1px solid var(--lc33);border-radius:12px;padding:8px 14px;text-align:right;cursor:pointer;transition:all .2s}
    .lvl-badge .lbl{font-size:10px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px}
    .lvl-badge .val{font-size:17px;font-weight:900;letter-spacing:-.5px}
    .lvl-badge .val span{font-size:11px;font-weight:600}
    .exp-track{height:4px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;margin-top:5px}
    .exp-fill{height:100%;border-radius:99px;transition:width .8s cubic-bezier(.4,0,.2,1)}
    .quick{display:flex;gap:7px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.04)}
    .qpill{flex:1;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:12px;padding:9px 6px;text-align:center}
    .qpill .v{font-size:16px;font-weight:900}

    .nav{display:flex;border-bottom:1px solid rgba(255,255,255,.05);overflow-x:auto}
    .nav button{flex:1;min-width:60px;padding:11px 0;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.25);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}

    /* CARDS */
    .card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:14px 16px;margin-bottom:10px}
    .cat-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:12px 14px;margin-bottom:8px}
    .cat-grid{display:grid;grid-template-columns:32px 1fr 46px;align-items:center;gap:10px}

    .sec{font-size:10px;font-weight:700;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
    .save-btn{display:block;width:100%;padding:15px;border-radius:14px;border:none;color:#fff;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:.3px;margin-bottom:20px;transition:opacity .15s;background:linear-gradient(135deg,#6C63FF,#8B5CF6,#a855f7);box-shadow:0 4px 24px rgba(108,99,255,.35)}

    /* HISTORY */

    .hbadge{width:42px;height:42px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;border-width:1.5px;border-style:solid}
    .htag{border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700}

    /* LEVEL */
    .level-hero{border-radius:20px;padding:24px 20px;margin-bottom:12px;text-align:center;position:relative;overflow:hidden}
    .level-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;margin-bottom:6px;border:1px solid rgba(255,255,255,.04);transition:all .2s}
    .level-badge{width:32px;height:32px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;border-width:1.5px;border-style:solid}
    .stat3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
    .stat3c{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px 10px;text-align:center}

    /* AUTH */
    .auth-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:32px 24px;background:#060a14}

    .auth-input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:13px 16px;color:#f1f5f9;font-size:16px;outline:none;margin-bottom:12px}

    .code-box{background:rgba(129,140,248,.1);border:1px solid rgba(129,140,248,.25);border-radius:12px;padding:12px 16px;text-align:center;margin-bottom:12px;cursor:pointer}
    .code-val{font-size:28px;font-weight:900;color:#818CF8;letter-spacing:4px;font-variant-numeric:tabular-nums}
    .code-hint{font-size:11px;color:rgba(255,255,255,.3);margin-top:4px}

    /* LEADERBOARD */
    .lb-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}

    .lb-avatar{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}

    /* ACHIEVEMENTS */
    .ach-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px}
    .ach-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}

    /* TABBAR */
    .tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(6,10,20,.95);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,.06);display:flex;padding:8px 0 calc(8px + var(--safe-bot));z-index:100}

    .tbtn.active{color:var(--lc)}
    .tbtn .ti{font-size:20px}

    /* TOAST */
    .toast{position:fixed;bottom:calc(96px + var(--safe-bot));left:50%;transform:translateX(-50%);background:rgba(30,41,59,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:#34D399;padding:11px 26px;border-radius:100px;font-size:13px;font-weight:700;border:1px solid rgba(52,211,153,.2);box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:999;pointer-events:none;display:none}
    .toast.show{display:block;animation:toastIn .25s cubic-bezier(.34,1.56,.64,1)}
    .loader{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.1);border-top-color:#818CF8;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
    .empty{text-align:center;padding:48px 0;color:rgba(255,255,255,.2)}
    .empty .ei{font-size:44px;margin-bottom:10px}
    .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
    .toggle{width:44px;height:26px;border-radius:99px;border:none;cursor:pointer;position:relative;transition:background .3s;flex-shrink:0}
    .toggle::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .3s}
    .toggle.on{background:#818CF8}
    .toggle.on::after{transform:translateX(18px)}
    .toggle.off{background:rgba(255,255,255,.15)}
    .input-row{margin-bottom:12px}
    .input-lbl{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:6px;font-weight:600}
  </style>
</head>
<body>
<div id="app">

      <div class="header-inner">
        <div>
          <h1>Life Stats</h1>
          <div class="date" id="hdate"></div>
        </div>
        <div class="lvl-badge" id="lvlbadge" onclick="setView('level')">
          <div class="lbl">Level</div>
          <div class="val" id="lvlval">–</div>
          <div class="exp-track"><div class="exp-fill" id="expfill" style="width:0%"></div></div>
        </div>
      </div>
    </div>
    <div class="quick">
      <div class="qpill"><div class="v" id="qs-avg">–</div><div class="l">Ø Score</div></div>

      <div class="qpill"><div class="v" id="qs-streak">–</div><div class="l">Streak</div></div>
    </div>

      <button class="tbtn" id="tb-friends" onclick="setView('friends')"><span class="ti">👥</span>Freunde</button>
      <button class="tbtn" id="tb-leaderboard" onclick="setView('leaderboard')"><span class="ti">🏆</span>Ranking</button>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// SUPABASE CONFIG – ersetze diese Werte mit deinen eigenen!
// ═══════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://rbzmwubpwerqudhxafxn.supabase.com';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJiem13dWJwd2VycXVkaHhhZnhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NzMzMjUsImV4cCI6MjA5ODI0OTMyNX0.V2kDwmv02HZD4jsYkHareLDZKdlQIkcfSl-M_lyR6lc';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── CATEGORIES (humane Werte) ────────────────────────────
const CATS = [
  {id:'sleep',     label:'Schlaf',     unit:'h',  icon:'🌙',max:10, optimal:8,  bell:true,  color:'#818CF8'},
  {id:'water',     label:'Wasser',     unit:'L',  icon:'💧',max:3,  optimal:2.5,bell:false, color:'#38BDF8'},
  {id:'sport',     label:'Sport',      unit:'min',icon:'🏋️',max:90, optimal:45, bell:false, color:'#34D399'},
  {id:'focus',     label:'Deep Work',  unit:'h',  icon:'🧠',max:6,  optimal:3,  bell:false, color:'#F59E0B'},
  {id:'mood',      label:'Stimmung',   unit:'/10',icon:'😊',max:10, optimal:10, bell:false, color:'#F472B6'},
  {id:'steps',     label:'Schritte',   unit:'k',  icon:'👟',max:15, optimal:8,  bell:false, color:'#A78BFA'},
  {id:'reading',   label:'Lesen',      unit:'min',icon:'📚',max:60, optimal:20, bell:false, color:'#FB923C'},
  {id:'meditation',label:'Meditation', unit:'min',icon:'🧘',max:30, optimal:10, bell:false, color:'#2DD4BF'},
];

// ─── LEVELS ──────────────────────────────────────────────
const LEVELS = [
  {level:1, title:'Einsteiger',        minExp:0},
  {level:2, title:'Anfänger',          minExp:100},
  {level:3, title:'Lernender',         minExp:250},
  {level:4, title:'Aufsteiger',        minExp:450},
  {level:5, title:'Fokussierter',      minExp:700},
  {level:6, title:'Disziplinierter',   minExp:1000},
  {level:7, title:'Routinier',         minExp:1400},
  {level:8, title:'Beständiger',       minExp:1900},
  {level:9, title:'Fortgeschrittener', minExp:2500},
  {level:10,title:'Profi',             minExp:3200},
  {level:11,title:'Experte',           minExp:4100},
  {level:12,title:'Meister',           minExp:5200},
  {level:13,title:'Elite',             minExp:6500},
  {level:14,title:'Champion',          minExp:8000},
  {level:15,title:'Legende',           minExp:10000},
];

// ─── ACHIEVEMENTS ─────────────────────────────────────────
const ACHIEVEMENTS = [
  {id:'first_day',   icon:'🌱', title:'Erster Schritt',    desc:'Ersten Tag eingetragen',         check:(days,streak)=>Object.keys(days).length>=1},
  {id:'streak3',     icon:'🔥', title:'On Fire',           desc:'3 Tage Streak',                  check:(days,streak)=>streak>=3},
  {id:'streak7',     icon:'⚡', title:'Wochenkrieger',     desc:'7 Tage Streak',                  check:(days,streak)=>streak>=7},
  {id:'streak30',    icon:'💎', title:'Monatsheld',        desc:'30 Tage Streak',                 check:(days,streak)=>streak>=30},
  {id:'streak100',   icon:'👑', title:'Unstoppable',       desc:'100 Tage Streak',                check:(days,streak)=>streak>=100},
  {id:'perfect',     icon:'⭐', title:'Perfekter Tag',     desc:'Score 100 erreicht',             check:(days)=>Object.values(days).some(d=>calcScore(d)===100)},
  {id:'score90',     icon:'🎯', title:'Fast perfekt',      desc:'Score 90+ erreicht',             check:(days)=>Object.values(days).some(d=>(calcScore(d)||0)>=90)},
  {id:'days7',       icon:'📅', title:'Eine Woche',        desc:'7 Tage eingetragen',             check:(days)=>Object.keys(days).length>=7},
  {id:'days30',      icon:'📆', title:'Ein Monat',         desc:'30 Tage eingetragen',            check:(days)=>Object.keys(days).length>=30},
  {id:'days100',     icon:'🏆', title:'100 Tage',          desc:'100 Tage eingetragen',           check:(days)=>Object.keys(days).length>=100},
  {id:'social',      icon:'👥', title:'Kein Einzelkämpfer',desc:'Ersten Freund hinzugefügt',      check:(days,streak,friends)=>friends>=1},
  {id:'level5',      icon:'🚀', title:'Abheben',           desc:'Level 5 erreicht',               check:(days)=>getLevelInfo(getTotalExp(days)).cur.level>=5},
  {id:'level10',     icon:'🌟', title:'Experte',           desc:'Level 10 erreicht',              check:(days)=>getLevelInfo(getTotalExp(days)).cur.level>=10},
  {id:'level15',     icon:'🏅', title:'Legende',           desc:'Maximales Level erreicht',       check:(days)=>getLevelInfo(getTotalExp(days)).cur.level>=15},
];

const LVL_COLORS = ['#818CF8','#38BDF8','#34D399','#F59E0B','#F472B6','#c084fc'];
const AVATARS = ['😎','🦁','🐺','🦊','🐲','🦅','🌊','⚡','🔥','💫','🎯','🏆'];

// ─── STATE ────────────────────────────────────────────────
let currentUser = null;
let userProfile = null;
let days = {};
let friends = [];
let currentView = 'today';
let draft = {};
let inLeaderboard = true;
let db = null;

// ─── INDEXEDDB ───────────────────────────────────────────
function openDB() {
  return new Promise((res,rej)=>{
    const r = indexedDB.open('lifestats',1);
    r.onupgradeneeded = e => e.target.result.createObjectStore('data',{keyPath:'key'});
    r.onsuccess = e => res(e.target.result);
    r.onerror = e => rej(e);
  });
}
async function dbGet(key) {
  if (!db) db = await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction('data','readonly');
    const r = tx.objectStore('data').get(key);
    r.onsuccess = ()=> res(r.result?.value);
    r.onerror = rej;
  });
}
async function dbSet(key,value) {
  if (!db) db = await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction('data','readwrite');
    tx.objectStore('data').put({key,value});
    tx.oncomplete = res;
    tx.onerror = rej;
  });
}

// ─── SCORING ─────────────────────────────────────────────
function catScore(cat,val){
  const v=parseFloat(val||0);
  if(v<=0) return 0;
  if(cat.bell){const r=v/cat.optimal;return r<=1?r:Math.max(0,1-(r-1)*0.6);}
  return Math.min(v/cat.optimal,1);
}
function calcScore(entry){
  if(!entry) return null;
  const vals=CATS.map(c=>catScore(c,entry[c.id]));
  if(!vals.some(v=>v>0)) return null;
  return Math.round(vals.reduce((a,b)=>a+b,0)/CATS.length*100);
}
function scoreColor(s){return s>=80?'#34D399':s>=60?'#F59E0B':s>=40?'#FB923C':'#F87171';}
function calcExp(entry,score){
  if(!entry||score==null) return 0;
  return Math.round(score*1.5)+(score>=90?25:score>=80?10:0);
}
function getTotalExp(daysObj){
  const d=daysObj||days;
  return Object.keys(d).reduce((acc,k)=>{const sc=calcScore(d[k]);return acc+calcExp(d[k],sc);},0);
}
function getLevelInfo(totalExp){
  let cur=LEVELS[0],nxt=LEVELS[1];
  for(let i=LEVELS.length-1;i>=0;i--){if(totalExp>=LEVELS[i].minExp){cur=LEVELS[i];nxt=LEVELS[i+1]||null;break;}}
  const inLevel=totalExp-cur.minExp,needed=nxt?nxt.minExp-cur.minExp:1;
  return{cur,nxt,inLevel,needed,progress:nxt?Math.min(inLevel/needed,1):1,totalExp};
}
function lvlColor(level){return LVL_COLORS[(level-1)%LVL_COLORS.length];}
function getStreak(){
  let s=0;const d=new Date();
  while(days[d.toISOString().slice(0,10)]){s++;d.setDate(d.getDate()-1);}
  return s;
}
function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtDate(ds){return new Date(ds+'T12:00:00').toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'});}
function genCode(){return Math.random().toString(36).slice(2,8).toUpperCase();}
function avatarBg(seed){const colors=['#6C63FF','#38BDF8','#34D399','#F59E0B','#F472B6','#FB923C'];return colors[seed%colors.length];}

// ─── SVG HELPERS ─────────────────────────────────────────
function ringHTML(pct,color,size=46){
  const r=(size-7)/2,circ=2*Math.PI*r,dash=Math.min(pct,1)*circ;
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg);display:block">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="5"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="5"
      stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
  </svg>`;
}
function scoreArcHTML(score){
  const W=170,r=66,circ=Math.PI*r;
  const col=score!=null?scoreColor(score):'rgba(255,255,255,.08)';
  const dash=score!=null?score/100*circ:0;
  return `<svg width="${W}" height="86" viewBox="0 0 ${W} 86">
    <defs><linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="${col}" stop-opacity=".6"/><stop offset="100%" stop-color="${col}"/>
    </linearGradient></defs>
    <path d="M 12 82 A ${r} ${r} 0 0 1 ${W-12} 82" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="10" stroke-linecap="round"/>
    <path d="M 12 82 A ${r} ${r} 0 0 1 ${W-12} 82" fill="none" stroke="url(#ag)" stroke-width="10" stroke-linecap="round" stroke-dasharray="${dash} ${circ}"/>
    <text x="${W/2}" y="66" text-anchor="middle" fill="${col}" style="font-size:34px;font-weight:900;font-family:system-ui">${score??'–'}</text>
    <text x="${W/2}" y="82" text-anchor="middle" fill="rgba(255,255,255,.3)" style="font-size:11px;font-family:system-ui;letter-spacing:1px">TAGESSCORE</text>
  </svg>`;
}
function sparklineHTML(data){
  if(data.length<2) return '<p style="font-size:12px;color:rgba(255,255,255,.2);padding:10px 0">Mehr Tage eintragen für Verlauf.</p>';
  const W=280,H=52,max=Math.max(...data,1),min=Math.min(...data,0),range=max-min||1;
  const pt=(s,i)=>[i/(data.length-1)*W,H-8-(s-min)/range*(H-16)];
  const pts=data.map((s,i)=>pt(s,i).join(',')).join(' ');
  const area=`M ${pt(data[0],0).join(',')} ${data.slice(1).map((s,i)=>'L '+pt(s,i+1).join(',')).join(' ')} L ${W} ${H} L 0 ${H} Z`;
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block;overflow:visible">
    <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6C63FF" stop-opacity=".3"/><stop offset="100%" stop-color="#6C63FF" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#sg)"/>
    <polyline points="${pts}" fill="none" stroke="#818CF8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${data.map((s,i)=>{const[x,y]=pt(s,i);return`<circle cx="${x}" cy="${y}" r="3.5" fill="#060a14" stroke="#818CF8" stroke-width="2"/><text x="${x}" y="${y-8}" text-anchor="middle" fill="rgba(255,255,255,.35)" style="font-size:9px;font-family:system-ui">${s}</text>`;}).join('')}
  </svg>`;
}

async function doAuth(mode){
  const email=document.getElementById('auth-email').value.trim();
  const pw=document.getElementById('auth-pw').value;
  const errEl=document.getElementById('auth-err');
  errEl.textContent='';
  if(!email||!pw){errEl.textContent='Bitte alle Felder ausfüllen.';return;}
  const btn=document.querySelector('.auth-btn');
  btn.innerHTML='<span class="loader"></span>Laden…';btn.disabled=true;

  if(mode==='login'){
    const{data,error}=await sb.auth.signInWithPassword({email,password:pw});
    if(error){errEl.textContent='Falsche E-Mail oder Passwort.';btn.innerHTML='Einloggen';btn.disabled=false;return;}
  } else {
    const name=document.getElementById('auth-name').value.trim()||email.split('@')[0];
    const{data,error}=await sb.auth.signUp({email,password:pw,options:{data:{display_name:name}}});
    if(error){errEl.textContent=error.message;btn.innerHTML='Account erstellen';btn.disabled=false;return;}
  }
  // onAuthStateChange will handle the rest
}

async function doLogout(){
  await sb.auth.signOut();
  currentUser=null;userProfile=null;days={};friends=[];
  document.getElementById('main-ui').style.display='none';
  document.getElementById('auth-ui').style.display='';
  renderAuth('login');
}

async function loadProfile(user){
  // Get or create profile
  let{data:prof}=await sb.from('profiles').select('*').eq('id',user.id).single();
  if(!prof){
    const code=genCode();
    const avatar=AVATARS[Math.floor(Math.random()*AVATARS.length)];
    const name=user.user_metadata?.display_name||user.email.split('@')[0];
    const{data:newProf}=await sb.from('profiles').insert({id:user.id,username:name,friend_code:code,avatar,in_leaderboard:true,total_exp:0,streak:0}).select().single();
    prof=newProf;
  }
  userProfile=prof;
  inLeaderboard=prof.in_leaderboard;

  // Load days from IndexedDB (local)
  const localKey='lifestats_days_'+user.id;
  try{const stored=await dbGet(localKey);if(stored)days=JSON.parse(stored);}catch{}

  // Load friends
  await loadFriends();
}

async function loadFriends(){
  if(!currentUser) return;
  const{data}=await sb.from('friendships').select('friend_id,profiles!friendships_friend_id_fkey(id,username,avatar,total_exp,streak,in_leaderboard)').eq('user_id',currentUser.id);
  friends=data||[];
}

async function saveDays(){
  if(!currentUser) return;
  const localKey='lifestats_days_'+currentUser.id;
  await dbSet(localKey,JSON.stringify(days));
  // Update total_exp and streak in supabase
  const totalExp=getTotalExp();
  const streak=getStreak();
  await sb.from('profiles').update({total_exp:totalExp,streak}).eq('id',currentUser.id);
}

function onCatInput(id,val){
  draft[id]=val;
  const cat=CATS.find(c=>c.id===id);
  const sc=catScore(cat,val);
  const over=cat.bell&&parseFloat(val||0)>cat.optimal;
  const ringColor=over?'#FB923C':cat.color;
  const barColor=over?'linear-gradient(90deg,#F59E0B,#FB923C)':`linear-gradient(90deg,${cat.color}99,${cat.color})`;
  const prog=document.getElementById('prog-'+id);
  if(prog){prog.style.width=(sc*100)+'%';prog.style.background=barColor;prog.style.boxShadow=val?`0 0 8px ${cat.color}55`:'none';}
  const ring=document.getElementById('ring-'+id);
  if(ring) ring.innerHTML=ringHTML(sc,ringColor);
  updateHeader();
}

    const entry=days[date];
    const sc=calcScore(entry);
    const col=sc!=null?scoreColor(sc):'#334155';
    const exp=calcExp(entry,sc);
    const tags=CATS.map(c=>entry[c.id]?`<span class="htag" style="background:${c.color}18;color:${c.color}">${c.icon} ${entry[c.id]}${c.unit}</span>`:'').filter(Boolean).join('');
    h+=`<div class="hcard">
      ${sc!=null?`<div class="hbadge" style="background:${col}18;border-color:${col}44;color:${col}">${sc}</div>`:''}
      <div style="flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
          <span style="font-size:12px;font-weight:700;color:rgba(255,255,255,.5)">${date===today?'Heute':fmtDate(date)}</span>
          <span style="font-size:11px;font-weight:800;color:#818CF8">+${exp} EXP</span>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">${tags}</div>
        ${entry.note?`<div class="hnote">"${entry.note}"</div>`:''}
      </div>
    </div>`;
  });
  h+=`</div>`;
  document.getElementById('content').innerHTML=h;
}

function renderFriends(){
  const myCode=userProfile?.friend_code||'–';
  let h=`<div style="padding:16px 16px 0;animation:fadeUp .3s ease">`;

  // My code
  h+=`<div class="sec">Mein Freundes-Code</div>
  <div class="code-box" onclick="copyCode()">
    <div class="code-val">${myCode}</div>
    <div class="code-hint">Tippen zum Kopieren · Teile diesen Code mit Freunden</div>
  </div>`;

  // Add friend
  h+=`<div class="sec">Freund hinzufügen</div>
  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;gap:8px">
      <input class="cat-input" id="friend-code-input" placeholder="Freundes-Code eingeben" type="text"
        style="flex:1;text-transform:uppercase;letter-spacing:2px" maxlength="6"/>
      <button onclick="addFriend()" style="padding:10px 16px;background:linear-gradient(135deg,#6C63FF,#8B5CF6);border:none;border-radius:9px;color:#fff;font-weight:800;font-size:14px;cursor:pointer;flex-shrink:0">+</button>
    </div>
  </div>`;

  // Friends list
  h+=`<div class="sec">${friends.length} Freunde</div>`;
  if(!friends.length){
    h+=`<div class="empty"><div class="ei">👥</div><p style="color:rgba(255,255,255,.3)">Noch keine Freunde.<br>Teile deinen Code!</p></div>`;
  }
  friends.forEach(f=>{
    const prof=f.profiles;
    if(!prof) return;
    const li=getLevelInfo(prof.total_exp||0);
    const lc=lvlColor(li.cur.level);
    const bg=avatarBg(prof.username?.charCodeAt(0)||0);
    h+=`<div class="friend-card">
      <div class="friend-avatar" style="background:${bg}22;border:1.5px solid ${bg}44;color:${bg}">${prof.avatar||'😎'}</div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:800;color:rgba(255,255,255,.85);margin-bottom:3px">${prof.username||'Unbekannt'}</div>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:11px;color:${lc};font-weight:700">Lvl ${li.cur.level} · ${li.cur.title}</span>
          ${prof.streak>0?`<span style="font-size:11px;color:#F59E0B">🔥${prof.streak}d</span>`:''}
        </div>
        <div style="font-size:11px;color:rgba(255,255,255,.3);margin-top:2px">${(prof.total_exp||0).toLocaleString('de-DE')} EXP</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:10px;color:rgba(255,255,255,.25)">EXP</div>
        <div style="font-size:16px;font-weight:900;color:${lc}">${(prof.total_exp||0).toLocaleString('de-DE')}</div>
      </div>
    </div>`;
  });

  // Settings
  h+=`<div class="sec" style="margin-top:8px">Einstellungen</div>
  <div class="card">
    <div class="toggle-row">
      <div>
        <div style="font-size:13px;font-weight:700;color:rgba(255,255,255,.8)">Im Leaderboard erscheinen</div>
        <div style="font-size:11px;color:rgba(255,255,255,.3);margin-top:2px">Andere können dich im Ranking sehen</div>
      </div>
      <button class="toggle ${inLeaderboard?'on':'off'}" id="lb-toggle" onclick="toggleLeaderboard()"></button>
    </div>
    <div style="margin-top:14px">
      <button onclick="doLogout()" style="width:100%;padding:12px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);border-radius:10px;color:#F87171;font-size:13px;font-weight:700;cursor:pointer">Ausloggen</button>
    </div>
  </div>`;

  h+=`</div>`;
  document.getElementById('content').innerHTML=h;
}

function copyCode(){
  const code=userProfile?.friend_code||'';
  if(navigator.clipboard) navigator.clipboard.writeText(code).then(()=>showToast('✓ Code kopiert!'));
  else showToast(code);
}

async function addFriend(){
  const code=document.getElementById('friend-code-input').value.trim().toUpperCase();
  if(code.length<4){showToast('Bitte Code eingeben',true);return;}
  if(code===userProfile?.friend_code){showToast('Das bist du selbst 😄',true);return;}

  const{data:prof,error}=await sb.from('profiles').select('id,username').eq('friend_code',code).single();
  if(error||!prof){showToast('Code nicht gefunden',true);return;}

  // Check already friends
  const{data:existing}=await sb.from('friendships').select('id').eq('user_id',currentUser.id).eq('friend_id',prof.id).single();
  if(existing){showToast('Bereits befreundet!',true);return;}

  await sb.from('friendships').insert([
    {user_id:currentUser.id,friend_id:prof.id},
    {user_id:prof.id,friend_id:currentUser.id},
  ]);
  showToast(`✓ ${prof.username} hinzugefügt!`);
  await loadFriends();
  renderFriends();
}

async function toggleLeaderboard(){
  inLeaderboard=!inLeaderboard;
  await sb.from('profiles').update({in_leaderboard:inLeaderboard}).eq('id',currentUser.id);
  const btn=document.getElementById('lb-toggle');
  if(btn){btn.className='toggle '+(inLeaderboard?'on':'off');}
  showToast(inLeaderboard?'✓ Im Ranking sichtbar':'Aus Ranking entfernt');
}

async function renderLeaderboard(){
  document.getElementById('content').innerHTML=`<div style="padding:16px;animation:fadeUp .3s ease"><div class="sec">Lädt…</div></div>`;

  // Get all public profiles sorted by EXP
  const{data:allProfs}=await sb.from('profiles').select('*').eq('in_leaderboard',true).order('total_exp',{ascending:false}).limit(50);
  // Get top streaks
  const{data:streakProfs}=await sb.from('profiles').select('*').eq('in_leaderboard',true).order('streak',{ascending:false}).limit(50);

  const rankEmoji=i=>i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;

  let h=`<div style="padding:16px 16px 0;animation:fadeUp .3s ease">`;

  // EXP Leaderboard
  h+=`<div class="sec">🏆 EXP Leaderboard</div>`;
  if(!allProfs?.length){
    h+=`<div class="empty"><div class="ei">🏆</div><p>Noch keine Einträge.</p></div>`;
  }
  allProfs?.forEach((prof,i)=>{
    const li=getLevelInfo(prof.total_exp||0);
    const lc=lvlColor(li.cur.level);
    const isMe=prof.id===currentUser?.id;
    const bg=avatarBg(prof.username?.charCodeAt(0)||0);
    h+=`<div class="lb-card" style="${isMe?`border-color:${lc}44;background:${lc}08`:''}">
      <div class="lb-rank" style="color:${i<3?'#F59E0B':'rgba(255,255,255,.3)'}">${rankEmoji(i)}</div>
      <div class="lb-avatar" style="background:${bg}22;color:${bg}">${prof.avatar||'😎'}</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:800;color:${isMe?lc:'rgba(255,255,255,.8)'}">${prof.username||'Unbekannt'}${isMe?' (Du)':''}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.3)">Lvl ${li.cur.level} · ${li.cur.title}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:15px;font-weight:900;color:${lc}">${(prof.total_exp||0).toLocaleString('de-DE')}</div>
        <div style="font-size:10px;color:rgba(255,255,255,.25)">EXP</div>
      </div>
    </div>`;
  });

  // Streak Leaderboard
  h+=`<div class="sec" style="margin-top:16px">🔥 Streak Leaderboard</div>`;
  streakProfs?.filter(p=>p.streak>0).forEach((prof,i)=>{
    const isMe=prof.id===currentUser?.id;
    const bg=avatarBg(prof.username?.charCodeAt(0)||0);
    const li=getLevelInfo(prof.total_exp||0);
    const lc=lvlColor(li.cur.level);
    h+=`<div class="lb-card" style="${isMe?`border-color:#F59E0B44;background:rgba(245,158,11,.05)`:''}">
      <div class="lb-rank" style="color:${i<3?'#F59E0B':'rgba(255,255,255,.3)'}">${rankEmoji(i)}</div>
      <div class="lb-avatar" style="background:${bg}22;color:${bg}">${prof.avatar||'😎'}</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:800;color:${isMe?'#F59E0B':'rgba(255,255,255,.8)'}">${prof.username||'Unbekannt'}${isMe?' (Du)':''}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.3)">Lvl ${li.cur.level}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:15px;font-weight:900;color:#F59E0B">🔥${prof.streak}</div>
        <div style="font-size:10px;color:rgba(255,255,255,.25)">Tage</div>
      </div>
    </div>`;
  });

  if(!inLeaderboard){
    h+=`<div style="margin-top:12px;padding:12px 14px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.15);border-radius:12px;font-size:12px;color:rgba(248,113,113,.8);text-align:center">
      Du bist gerade nicht im Ranking sichtbar. Ändern unter Freunde → Einstellungen.
    </div>`;
  }

  h+=`</div>`;
  document.getElementById('content').innerHTML=h;
}

function setView(v){
  currentView=v;
  updateHeader();
  if(v==='today')       renderToday();
  else if(v==='level')  renderLevel();
  else if(v==='history')renderHistory();
  else if(v==='friends')renderFriends();
  else if(v==='leaderboard') renderLeaderboard();
  document.getElementById('content').scrollTop=0;
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
async function init(){
  renderAuth('login');

  sb.auth.onAuthStateChange(async(event,session)=>{
    if(session?.user){
      currentUser=session.user;
      document.getElementById('auth-ui').style.display='none';
      document.getElementById('main-ui').style.display='flex';
      await loadProfile(session.user);
      draft=days[todayStr()]?{...days[todayStr()]}:{};
      updateHeader();
      renderToday();
    } else {
      document.getElementById('main-ui').style.display='none';
      document.getElementById('auth-ui').style.display='';
      renderAuth('login');
    }
  });
}

init();
</script>
